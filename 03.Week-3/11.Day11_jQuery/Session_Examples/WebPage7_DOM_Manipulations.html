	<script  src="https://code.jquery.com/jquery-3.6.1.min.js"></script>
	
	<script>
	
		$(document).ready(function()
		{				
		 
			 
			 $("#button1").click(function(){

					let price = $("#t2").val();
					let qty = $("#t3").val();

					let newRowHtml = `
					<tr>
						<td> ${pname} </td>	
						<td> ${price} </td>	
						<td> ${qty} </td>	
					</tr>`;


					$("#table1 tbody").append(newRowHtml);	//  append as new child to the selected element
					$("input:text").val("");
					

			 });
			 
			 

		});				
	</script>
